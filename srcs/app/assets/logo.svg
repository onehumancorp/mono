    <path d="M512 944 L525 774 L499 774 Z" />
    <!-- Left -->
    <path d="M80 512 L250 525 L250 499 Z" />
    <!-- Right -->
    <path d="M944 512 L774 525 L774 499 Z" />
    
    <!-- Top-Left -->
    <path d="M206 206 L335 315 L315 335 Z" />
    <!-- Top-Right -->
    <path d="M818 206 L709 315 L689 335 Z" />
    <!-- Bottom-Left -->
    <path d="M206 818 L315 709 L335 689 Z" />
