name: ohc_app
description: One Human Corp — Cross-platform app (iOS, Android, macOS, Windows, Linux, Web)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  http: ^1.2.1
  web_socket_channel: ^2.4.0
  centrifuge: ^0.14.1

  # Local storage
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  path: ^1.9.0
  url_launcher: ^6.2.5
  riverpod_annotation: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
