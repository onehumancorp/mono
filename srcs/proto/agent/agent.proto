edition = "2024";

package agent;

import "srcs/proto/common/common.proto";

option go_package = "github.com/onehumancorp/mono/srcs/proto/agent;agent";

message Agent {
  string id = 1;
  common.Role role = 2;
  string name = 3;
  common.AgentStatus status = 4;
  string organization_id = 5;
}

message AgentMessage {
  string id = 1;
  string from_agent_id = 2;
  string to_agent_id = 3;
  string message_type = 4;
  string content = 5;
  string meeting_id = 6;
  int64 occurred_at_unix = 7;
}

service AgentOrchestration {
  rpc RegisterAgent(Agent) returns (Agent);
  rpc PublishMessage(AgentMessage) returns (AgentMessage);
}
