edition = "2024";

package ohc.billing;

import "google/protobuf/go_features.proto";

option go_package = "github.com/onehumancorp/mono/srcs/proto/ohc/billing;billingpb";
option features.(pb.go).api = OPAQUE;

message TokenUsage {
  string agent_id = 1;
  string organization_id = 2;
  string model = 3;
  int64 prompt_tokens = 4;
  int64 completion_tokens = 5;
  double cost_usd = 6;
  int64 occurred_at_unix = 7;
}

message CostSummary {
  string organization_id = 1;
  double total_cost_usd = 2;
  int64 total_tokens = 3;
  double projected_monthly_usd = 4;
  repeated AgentCostSummary agents = 5;
}

message AgentCostSummary {
  string agent_id = 1;
  double cost_usd = 2;
  int64 token_used = 3;
}

message BudgetAlert {
  string id = 1;
  string organization_id = 2;
  double threshold_usd = 3;
  double notify_at_pct = 4;
  bool triggered = 5;
}

service BillingService {
  rpc TrackTokenUsage(TokenUsage) returns (TokenUsage);
  rpc GetCostSummary(TokenUsage) returns (CostSummary);
}
