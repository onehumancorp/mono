apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.backend.service.port }}"
            {{- if .Values.redis.enabled }}
            - name: REDIS_ADDR
              value: "{{ .Release.Name }}-redis-master:6379"
            {{- end }}
            {{- if .Values.cnpg.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.cnpg.owner }}:$(POSTGRES_PASSWORD)@{{ .Values.cnpg.clusterName }}-rw:5432/{{ .Values.cnpg.database }}?sslmode=require"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.clusterName }}-app
                  key: password
            {{- end }}
            {{- if .Values.chatwoot.enabled }}
            - name: CHATWOOT_ENABLED
              value: "true"
            - name: CHATWOOT_URL
              value: "http://{{ .Release.Name }}-chatwoot:{{ .Values.chatwoot.service.port }}"
            - name: CHATWOOT_ADMIN_EMAIL
              value: "{{ .Values.chatwoot.adminEmail }}"
            - name: CHATWOOT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-chatwoot-secret
                  key: adminPassword
            {{- end }}
            - name: OHC_MULTITENANT
              value: "{{ .Values.multiTenant.enabled }}"
            {{- if .Values.ohcCore.enabled }}
            - name: OHC_CORE_URL
              value: "http://{{ .Release.Name }}-ohc-core:{{ .Values.ohcCore.service.port }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
