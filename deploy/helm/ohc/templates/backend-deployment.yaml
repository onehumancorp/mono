apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.backend.service.port }}"
            {{- if .Values.redis.enabled }}
            - name: REDIS_ADDR
              value: "{{ .Release.Name }}-redis-master:6379"
            {{- end }}
            {{- if .Values.cnpg.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.cnpg.owner }}:$(POSTGRES_PASSWORD)@{{ .Values.cnpg.clusterName }}-rw:5432/{{ .Values.cnpg.database }}?sslmode=require"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.clusterName }}-app
                  key: password
            {{- end }}
            {{- if .Values.chatwoot.enabled }}
            - name: CHATWOOT_ENABLED
              value: "true"
            - name: CHATWOOT_URL
              value: "http://{{ .Release.Name }}-chatwoot:{{ .Values.chatwoot.service.port }}"
            - name: CHATWOOT_ADMIN_EMAIL
              value: "{{ .Values.chatwoot.adminEmail }}"
            - name: CHATWOOT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-chatwoot-secret
                  key: adminPassword
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu | quote }}
              memory: {{ .Values.backend.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu | quote }}
              memory: {{ .Values.backend.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
