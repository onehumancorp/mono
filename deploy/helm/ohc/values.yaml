backend:
  image: onehumancorp/mono-backend:latest
  replicas: 1
  service:
    port: 8080

frontend:
  image: onehumancorp/mono-frontend:latest
  replicas: 1
  service:
    port: 8081

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false

postgresql:
  enabled: false
  auth:
    enablePostgresUser: true
    postgresPassword: postgres
    username: ohc
    password: ohc
    database: ohc