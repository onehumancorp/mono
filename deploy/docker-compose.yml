version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Dockerfile
    image: onehumancorp/mono-backend:dev
    environment:
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://ohc:ohc@postgres:5432/ohc?sslmode=disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Dockerfile
    image: onehumancorp/mono-frontend:dev
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "8081:8081"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ohc
      POSTGRES_PASSWORD: ohc
      POSTGRES_DB: ohc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohc"]
      interval: 5s
      timeout: 3s
      retries: 10
