version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Dockerfile
    image: onehumancorp/mono-backend:dev
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Dockerfile
    image: onehumancorp/mono-frontend:dev
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "8081:8081"