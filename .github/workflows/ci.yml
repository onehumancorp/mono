name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ runner.os }}-bazel-disk-${{ hashFiles('**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          repository-cache: true

      - name: Test
        env:
          BAZEL_DISK_CACHE: ${{ env.BAZEL_DISK_CACHE }}
          BAZEL_REPOSITORY_CACHE: ${{ env.BAZEL_REPOSITORY_CACHE }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          if [ -z "$BUILDBUDDY_API_KEY" ]; then
            bazelisk test //... \
              --test_output=errors \
              --test_summary=terse \
              --test_timeout=300,600,900,1800 \
              --disk_cache="$BAZEL_DISK_CACHE" \
              --repository_cache="$BAZEL_REPOSITORY_CACHE" \
              --remote_upload_local_results=false \
              --build_event_json_file="" \
              --bes_results_url="" \
              --bes_backend=""
          else
            bazelisk test //... \
              --test_output=errors \
              --test_summary=terse \
              --test_timeout=300,600,900,1800 \
              --disk_cache="$BAZEL_DISK_CACHE" \
              --repository_cache="$BAZEL_REPOSITORY_CACHE" \
              --bes_results_url="" \
              --bes_backend="" \
              --remote_upload_local_results=false \
              --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          fi
