name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ runner.os }}-bazel-disk-${{ hashFiles('**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          repository-cache: true

      - name: Test
        env:
          BAZEL_DISK_CACHE: ${{ env.BAZEL_DISK_CACHE }}
          BAZEL_REPOSITORY_CACHE: ${{ env.BAZEL_REPOSITORY_CACHE }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_OFFICIAL_API_KEY }}
        run: |
          bazelisk test //... \
            --test_output=errors \
            --test_summary=terse \
            --test_timeout=300,600,900,1800 \
            --disk_cache="$BAZEL_DISK_CACHE" \
            --repository_cache="$BAZEL_REPOSITORY_CACHE" \
            --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY

  # This job is the REQUIRED STATUS CHECK to configure in branch protection.
  # It always runs and fails if bazel-test was skipped, cancelled, or failed,
  # ensuring PRs cannot be merged when CI did not fully pass.
  ci-required:
    name: CI Required
    needs: [bazel-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check bazel-test result
        run: |
          result="${{ needs.bazel-test.result }}"
          echo "bazel-test result: $result"
          if [[ "$result" != "success" ]]; then
            echo "::error::bazel-test did not succeed (status: $result). Merging is blocked."
            exit 1
          fi
