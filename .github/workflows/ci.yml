name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ runner.os }}-bazel-disk-${{ hashFiles('**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          repository-cache: true

      - name: Test
        env:
          BAZEL_DISK_CACHE: ${{ env.BAZEL_DISK_CACHE }}
          BAZEL_REPOSITORY_CACHE: ${{ env.BAZEL_REPOSITORY_CACHE }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_OFFICIAL_API_KEY }}
        run: |
          # If BUILDBUDDY_API_KEY is not set (e.g. from a fork PR), fall back to the public read-only key
          API_KEY="${BUILDBUDDY_API_KEY:-vGFjlQg7X49NwoQHAfRW}"
          bazelisk test //... \
            --test_output=errors \
            --test_summary=terse \
            --test_timeout=300,600,900,1800 \
            --disk_cache="$BAZEL_DISK_CACHE" \
            --repository_cache="$BAZEL_REPOSITORY_CACHE" \
            --remote_header=x-buildbuddy-api-key="$API_KEY"
